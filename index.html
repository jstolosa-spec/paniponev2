<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PanipOne - Barangay Panipuan Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0EA5E9',
                        secondary: '#64748B'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col">
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <a href="#home" class="flex items-center gap-2 font-black text-xl tracking-tight">
                <div class="w-8 h-8 bg-sky-500 rounded-lg flex items-center justify-center text-white">
                    <i data-lucide="landmark" class="w-5 h-5"></i>
                </div>
                PanipOne
            </a>
            <div class="hidden md:flex gap-8 text-sm font-bold text-slate-600">
                <a href="#home" class="hover:text-sky-500 transition-colors">Home</a>
                <a href="#directory" class="hover:text-sky-500 transition-colors">Directory</a>
                <a href="#officials" class="hover:text-sky-500 transition-colors">Officials</a>
                <a href="#emergency" class="hover:text-rose-500 transition-colors">Emergency</a>
            </div>
            <div id="nav-auth"></div>
        </div>
    </nav>
    <main id="app-root" class="flex-grow"></main>
    <footer class="bg-white border-t border-slate-200 py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <span class="font-black text-lg text-slate-400">PanipOne</span>
            <p class="text-sm text-slate-400 mt-2">© <span id="year"></span> Barangay Panipuan. All rights reserved.</p>
        </div>
    </footer>
    <script src="app.js"></script>
</body>
</html>
