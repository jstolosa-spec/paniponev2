<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PanipOne - Barangay Panipuan Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: '#0EA5E9', dark: '#0284C7' },
                        background: '#ffffff',
                        foreground: '#0f172a',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="#home" class="flex items-center gap-2 group">
                    <div class="bg-sky-500 p-1.5 rounded-lg text-white group-hover:rotate-6 transition-transform">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    </div>
                    <span class="text-xl font-bold tracking-tight text-slate-900">PanipOne</span>
                </a>
                <div class="hidden md:flex items-center gap-8 text-sm font-semibold text-slate-600" id="nav-links">
                    <a href="#home" class="hover:text-sky-600 transition-colors">Home</a>
                    <a href="#directory" class="hover:text-sky-600 transition-colors">Directory</a>
                    <a href="#officials" class="hover:text-sky-600 transition-colors">Officials</a>
                    <a href="#emergency" class="hover:text-sky-600 transition-colors">Emergency</a>
                </div>
                <div class="flex items-center gap-4" id="nav-auth">
                    <a href="#login" class="text-sm font-bold text-sky-600 px-4 py-2 hover:bg-sky-50 rounded-lg transition-colors">Sign In</a>
                    <a href="#register" class="text-sm font-bold bg-sky-500 text-white px-4 py-2 rounded-lg hover:bg-sky-600 shadow-lg shadow-sky-500/20 transition-all">Join</a>
                </div>
            </div>
        </div>
    </nav>
    <!-- App Root -->
    <main id="app-root" class="flex-grow"></main>
    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <div class="flex justify-center items-center gap-2 mb-4">
                <div class="h-6 w-6 bg-sky-500 rounded text-white flex items-center justify-center text-xs font-bold">P</div>
                <span class="font-bold text-lg">PanipOne</span>
            </div>
            <p class="text-sm text-slate-500 max-w-md mx-auto">The official digital portal for Barangay Panipuan. Empowering residents through transparency and accessibility.</p>
            <div class="mt-8 pt-8 border-t border-slate-100 text-xs text-slate-400">
                &copy; <span id="year"></span> Barangay Panipuan. All rights reserved.
            </div>
        </div>
    </footer>
    <script type="module" src="app.js"></script>
</body>
</html>
